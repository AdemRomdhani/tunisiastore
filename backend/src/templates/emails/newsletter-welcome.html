<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenue - Tunisia Store</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; width: 100%;">
  <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    {{header}}
    <div style="background: #ffffff; padding: 30px; border-radius: 0 0 8px 8px;">
      <h1 style="color: #1e293b; font-size: 24px; font-weight: 700; margin-bottom: 20px;">Bienvenue sur Tunisia Store !</h1>
      <p style="color: #475569; font-size: 15px; line-height: 1.6; margin-bottom: 15px;">Merci de vous être inscrit à notre newsletter.</p>
      <p style="color: #475569; font-size: 15px; line-height: 1.6; margin-bottom: 15px;">Vous recevrez désormais nos dernières offres, promotions et nouvelles.</p>

      <div style="height: 1px; background: #e2e8f0; margin: 25px 0;"></div>

      <div style="text-align: center; margin: 25px 0;">
        <a href="{{frontendUrl}}" style="display: inline-block; background: #dc2626; color: #ffffff; padding: 14px 28px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 15px;">
          Découvrir nos produits
        </a>
      </div>

      <div style="height: 1px; background: #e2e8f0; margin: 25px 0;"></div>

      <p style="color: #475569; font-size: 15px; line-height: 1.6; text-align: center; font-size: 13px; color: #64748b;">
        Vous pouvez vous désabonner à tout moment.
      </p>
    </div>
    {{footer}}
  </div>
</body>
</html>
