<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau message - Tunisia Store</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; width: 100%;">
  <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #1e293b; padding: 20px; text-align: center; border-radius: 8px 8px 0 0;">
      <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Tunisia Store</h1>
    </div>
    <div style="background: #ffffff; padding: 30px; border-radius: 0 0 8px 8px;">
      <h1 style="color: #1e293b; font-size: 24px; font-weight: 700; margin-bottom: 20px;">Nouveau message de contact</h1>
      
      <div style="background: #f8fafc; padding: 20px; border-radius: 8px; margin: 20px 0;">
        <p style="color: #475569; font-size: 15px; line-height: 1.6; margin-bottom: 10px;"><strong>Nom :</strong> {{contactName}}</p>
        <p style="color: #475569; font-size: 15px; line-height: 1.6; margin-bottom: 10px;"><strong>Email :</strong> <a href="mailto:{{contactEmail}}" style="color: #dc2626;">{{contactEmail}}</a></p>
        <p style="color: #475569; font-size: 15px; line-height: 1.6; margin-bottom: 10px;"><strong>Téléphone :</strong> {{contactPhone}}</p>
        {{subjectRow}}
      </div>

      <div style="background: #f8fafc; padding: 20px; border-radius: 8px; margin: 20px 0;">
        <p style="color: #475569; font-size: 15px; line-height: 1.6; margin-bottom: 10px;"><strong>Message :</strong></p>
        <p style="color: #475569; font-size: 15px; line-height: 1.6; margin: 0; white-space: pre-wrap;">{{contactMessage}}</p>
      </div>
    </div>
  </div>
</body>
</html>
