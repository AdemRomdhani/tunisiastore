build:
  command: npm install && npm run build
  publish: dist/tunisia-store/browser

services:
  - type: web
    name: tunisiastore-api
    env: node
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://tunisiastore.onrender.com