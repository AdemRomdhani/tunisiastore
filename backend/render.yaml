services:
  - type: web
    name: tunisiastore
    env: node
    region: frankfurt
    buildCommand: npm install && npm run build && mkdir -p dist/tunisia-store && cp -r ../frontend/dist/tunisia-store/browser dist/tunisia-store/
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://tunisiastore-5twr.onrender.com