name: CI - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Run tests
        working-directory: backend
        run: npm test -- --coverage
        env:
          MONGODB_URI: mongodb://localhost:27017/tunisia_store_test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
      
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v3
        with:
          directory: backend/coverage
          flags: backend
          name: tunisia-store-backend
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: backend/coverage

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      
      - name: Check code style
        working-directory: backend
        run: npx eslint src/ --ext .js

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test-backend, lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm ci --only=production
      
      - name: Build Docker image
        run: |
          cd backend
          docker build -t tunisia-store-backend:${{ github.sha }} .
      
      - name: Scan Docker for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tunisia-store-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      
      - name: Save Docker image
        uses: actions/upload-artifact@v3
        with:
          name: docker-backend
          path: backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build Angular app
        working-directory: frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/dist/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run npm audit
        run: |
          cd backend
          npm audit --audit-level=high --json > audit-backend.json || true
          cd ../frontend
          npm audit --audit-level=high --json > audit-frontend.json || true
      
      - name: Upload audit results
        uses: actions/upload-artifact@v3
        with:
          name: security-audit
          path: |
            backend/audit-backend.json
            frontend/audit-frontend.json

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test-backend, lint, build-backend, build-frontend]
    if: failure()
    
    steps:
      - name: Send failure notification
        run: |
          echo "CI Pipeline failed. Please check the logs."