services:
  - type: web
    name: tunisiastore
    rootDir: backend
    env: node
    region: frankfurt
    buildCommand: npm install && cd ../frontend && npm ci && npm run build && cp -r dist/tunisia-store/browser ../../dist/tunisia-store/
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://tunisiastore-5twr.onrender.com